name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 "*.md" ".github/**/*.md"

  validate:
    name: Scripts and configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check shell syntax
        run: |
          for file in install.sh scripts/*.sh tests/*.sh; do
            bash -n "$file"
          done
      - name: Run ShellCheck
        run: shellcheck --severity=warning install.sh scripts/*.sh tests/*.sh
      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Parse TOML configuration
        run: |
          python3 - <<'PY'
          import pathlib
          import tomllib

          tomllib.loads(pathlib.Path("triage.toml").read_text())
          PY
      - name: Run tests
        run: ./tests/test_cli_dispatch.sh
