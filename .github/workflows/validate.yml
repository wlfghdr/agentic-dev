name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: regression-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Run cli_dispatch regression tests
        run: ./tests/test_cli_dispatch.sh

      - name: Run install rendering regression tests
        run: ./tests/test_install_rendering.sh

      - name: Run review checkout regression tests
        run: ./tests/test_review_checkout.sh

      - name: Run review verdict regression tests
        run: ./tests/test_review_verdict.sh

      - name: Run maintenance detection regression tests
        run: ./tests/test_detect_maintenance.sh

      - name: Run Dependabot merge regression tests
        run: ./tests/test_dependabot_merge.sh

      - name: Run release regression tests
        run: ./tests/test_release.sh

      - name: Run release workflow regression tests
        run: ./tests/test_release_workflow.sh
