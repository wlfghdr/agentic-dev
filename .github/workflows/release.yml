name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: create-github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG.md
        run: |
          python3 - "$GITHUB_REF_NAME" <<'EOF'
          import re, sys

          tag = sys.argv[1].lstrip("v")
          text = open("CHANGELOG.md", encoding="utf-8").read()
          m = re.search(
              rf"^## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              text, re.S | re.M,
          )
          body = m.group(1).strip() if m else f"See CHANGELOG.md for {tag}."
          open("RELEASE_NOTES.md", "w", encoding="utf-8").write(body + "\n")
          EOF

      - name: Create GitHub release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/create-release.sh "$GITHUB_REF_NAME" RELEASE_NOTES.md
